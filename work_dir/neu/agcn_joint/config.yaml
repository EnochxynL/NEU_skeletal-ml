base_lr: 0.1
batch_size: 8
config: config/neu/train_joint.yaml
device:
- 0
eval_interval: 5
feeder: skeletal_dl.feeders.feeder.Feeder
ignore_weights: []
log_interval: 100
model: skeletal_dl.model.agcn.Model
model_args:
  graph: skeletal_dl.graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: spatial
  num_class: 10
  num_person: 2
  num_point: 25
model_saved_name: ./runs/neu_agcn_joint
nesterov: true
num_epoch: 40
num_worker: 0
only_train_epoch: 0
only_train_part: false
optimizer: SGD
phase: train
print_log: true
save_interval: 2
save_score: false
seed: 1
show_topk:
- 1
- 5
start_epoch: 0
step:
- 20
- 30
test_batch_size: 8
test_feeder_args:
  data_path: ./data/neu/val_data_joint.npy
  label_path: ./data/neu/val_label.pkl
train_feeder_args:
  data_path: ./data/neu/train_data_joint.npy
  debug: false
  label_path: ./data/neu/train_label.pkl
  normalization: false
  random_choose: false
  random_move: false
  random_shift: false
  window_size: -1
warm_up_epoch: 0
weight_decay: 0.0001
weights: null
work_dir: ./work_dir/neu/agcn_joint
