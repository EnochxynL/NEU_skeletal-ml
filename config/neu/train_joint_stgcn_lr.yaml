work_dir: ./work_dir/neu/stgcn_joint_lr
model_saved_name: ./runs/neu_stgcn_joint_lr
feeder: skeletal_dl.feeders.feeder.Feeder
train_feeder_args:
  data_path: ./data/neu/train_data_joint.npy
  label_path: ./data/neu/train_label.pkl
  debug: false
  random_choose: false
  random_shift: false
  random_move: false
  window_size: -1
  normalization: false
test_feeder_args:
  data_path: ./data/neu/val_data_joint.npy
  label_path: ./data/neu/val_label.pkl
model: skeletal_dl.model.stgcn.Model
model_args:
  num_class: 10
  num_point: 25
  num_person: 2
  graph: skeletal_dl.graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: spatial
  dropout: 0.5
weight_decay: 0.0001
base_lr: 0.05
step:
- 40
- 60
device:
- 0
batch_size: 32
test_batch_size: 32
num_epoch: 80
nesterov: true
