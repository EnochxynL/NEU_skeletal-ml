work_dir: ./work_dir/neu/agcn_bone
model_saved_name: ./runs/neu_agcn_bone_test
# feeder
feeder: skeletal_dl.feeders.feeder.Feeder
train_feeder_args:
  data_path: ./data/neu/train_data_bone.npy
  label_path: ./data/neu/train_label.pkl
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: -1
  normalization: False

test_feeder_args:
  data_path: ./data/neu/val_data_bone.npy
  label_path: ./data/neu/val_label.pkl

# model
model: skeletal_dl.model.agcn.Model
model_args:
  num_class: 10
  num_point: 25
  num_person: 2
  graph: skeletal_dl.graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: 'spatial'

#optim
weight_decay: 0.0001
base_lr: 0.1
step: [20, 30]

# training
device: [0]
batch_size: 32
test_batch_size: 32
num_epoch: 40
nesterov: True
